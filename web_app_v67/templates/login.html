<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 — 열화상 분기점검 보고서</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=59">
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6fa;padding:20px;}
.login-card{background:#fff;padding:32px 28px;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,0.08);width:100%;max-width:380px;}
.login-card h1{font-size:20px;color:#c8102e;margin-bottom:6px;}
.login-card .sub{font-size:13px;color:#666;margin-bottom:24px;}
.login-card label{display:block;font-size:13px;color:#444;margin-bottom:6px;font-weight:600;}
.login-card input[type=password]{width:100%;padding:12px 14px;font-size:16px;border:1px solid #d0d5dd;border-radius:6px;box-sizing:border-box;}
.login-card input[type=password]:focus{outline:0;border-color:#c8102e;}
.login-card button{width:100%;margin-top:18px;padding:12px;background:#c8102e;color:#fff;border:0;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;}
.login-card button:hover{background:#a40d25;}
.login-card .err{margin-top:14px;padding:10px 12px;background:#fff5f5;border-left:3px solid #c8102e;color:#c8102e;font-size:13px;border-radius:4px;}
.login-card .hint{margin-top:18px;font-size:11px;color:#999;text-align:center;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>🔥 열화상 분기점검 보고서</h1>
    <p class="sub">접속하려면 비밀번호를 입력하세요</p>
    <form method="post" autocomplete="off">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">로그인</button>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
    </form>
    <div class="hint">종로전기㈜ 태양광발전 사업부 · 내부 전용</div>
  </div>
</div>
</body>
</html>
