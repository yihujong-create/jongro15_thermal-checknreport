services:
  - type: web
    name: thermal-report
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    healthCheckPath: /healthz
    envVars:
      - key: APP_PASSWORD
        sync: false   # Render 대시보드에서 직접 입력
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.11.7
    disk:
      name: thermal-data
      mountPath: /var/data
      sizeGB: 1
